<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Chatbot</title>
  <meta name="description" content="Website AI Chatbot sederhana, modern, dan responsive" />

  <link rel="stylesheet" href="style.css" />

  <!-- Markdown parser -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.2/marked.min.js"></script>
  <!-- Syntax highlighter -->
  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css"
  />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>
<body>
  <!-- ============================================================ -->
  <!-- SCREEN 1: HALAMAN AWAL (Login / Guest)                       -->
  <!-- ============================================================ -->
  <section id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">✦</div>
        <h1>AI Chatbot</h1>
        <p class="auth-subtitle">Asisten AI pribadimu, siap membantu kapan saja.</p>
      </div>

      <!-- Pilihan awal -->
      <div id="auth-choice" class="auth-block">
        <button id="btn-show-login" class="btn btn-primary btn-block">
          Masuk menggunakan Username
        </button>
        <button id="btn-guest" class="btn btn-secondary btn-block">
          Lanjut sebagai Guest
        </button>
      </div>

      <!-- Form login username -->
      <form id="auth-login" class="auth-block hidden">
        <label for="username-input" class="auth-label">Masukkan Username</label>
        <input
          id="username-input"
          type="text"
          class="auth-input"
          placeholder="contoh: andi_setiawan"
          autocomplete="off"
          maxlength="20"
          required
        />
        <p id="login-error" class="auth-error hidden"></p>
        <button type="submit" class="btn btn-primary btn-block">Masuk</button>
        <button type="button" id="btn-back" class="btn btn-ghost btn-block">
          Kembali
        </button>
      </form>
    </div>
  </section>

  <!-- ============================================================ -->
  <!-- SCREEN 2: APLIKASI CHAT UTAMA                                 -->
  <!-- ============================================================ -->
  <section id="app-screen" class="app-screen hidden">
    <!-- Overlay untuk sidebar mobile -->
    <div id="sidebar-overlay" class="sidebar-overlay hidden"></div>

    <!-- SIDEBAR -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-user">
          <div class="sidebar-avatar" id="user-avatar">?</div>
          <div class="sidebar-user-info">
            <span id="sidebar-username" class="sidebar-username">-</span>
            <span id="sidebar-usertype" class="sidebar-usertype">-</span>
          </div>
        </div>
        <button id="btn-close-sidebar" class="icon-btn sidebar-close-btn" aria-label="Tutup sidebar">
          ✕
        </button>
      </div>

      <button id="btn-new-chat" class="btn btn-primary btn-block new-chat-btn">
        <span class="plus-icon">+</span> New Chat
      </button>

      <div class="sidebar-section-title">Riwayat Chat</div>
      <div id="chat-history-list" class="chat-history-list">
        <!-- diisi via JS -->
      </div>

      <button id="btn-logout" class="btn btn-ghost btn-block logout-btn">
        ⏻ Keluar
      </button>
    </aside>

    <!-- CHAT AREA -->
    <main class="chat-main">
      <header class="chat-topbar">
        <button id="btn-open-sidebar" class="icon-btn" aria-label="Buka sidebar">
          ☰
        </button>
        <h2 id="chat-title" class="chat-title">Chat Baru</h2>
        <div class="topbar-spacer"></div>
      </header>

      <div id="chat-messages" class="chat-messages">
        <div id="empty-state" class="empty-state">
          <div class="empty-state-icon">✦</div>
          <h3>Mulai percakapan baru</h3>
          <p>Tanyakan apa saja — mulai dari tugas kuliah, kode program, hingga ide kreatif.</p>
        </div>
      </div>

      <div id="typing-indicator" class="typing-indicator hidden">
        <div class="typing-dots">
          <span></span><span></span><span></span>
        </div>
        <span class="typing-text">AI sedang mengetik...</span>
      </div>

      <form id="chat-form" class="chat-input-area">
        <textarea
          id="chat-input"
          class="chat-input"
          placeholder="Tulis pesan..."
          rows="1"
          maxlength="4000"
        ></textarea>
        <button type="submit" id="btn-send" class="send-btn" aria-label="Kirim pesan">
          ➤
        </button>
      </form>
    </main>
  </section>

  <script src="script.js"></script>
</body>
</html>
